# Header row detection keywords (replaces HEADER_KEYWORDS in header_detector.py)
header_keywords:
  - "description"
  - "tag"
  - "quantity"
  - "item"
  - "part number"
  - "unit price"
  - "manufacturer"
  - "supplier"
  - "currency"
  - "delivery"
  - "uom"
  - "sap"
  - "classification"
  - "drawing"
  - "material"
  - "lead time"
  - "remarks"
  - "nomenclature"
  - "vendor"

# Sheet names that indicate utility/skip sheets (replaces UTILITY_KEYWORDS in sheet_analyzer.py)
utility_sheet_keywords:
  - "validation"
  - "lookup"
  - "reference"
  - "dropdown"
  - "list"
  - "instructions"
  - "cover"
  - "summary"
  - "index"
  - "contents"
  - "change log"
  - "revision"
  - "spir review"
  - "review sheet"
  - "guidelines"
  - "combined"
  - "tag sheet"

# Tag detection config (drives TAG_PATTERN in cell_utils.py)
tag_detection:
  min_prefix_length: 1        # 1 allows single-letter prefix tags like V-1234
  separator_chars: "[-/]"
  suffix_pattern: "[A-Z0-9]"
  split_chars: "[,/|;]"

# Vendor prefix stripping for OMN (replaces _VENDOR_PREFIXES in post_processor.py)
vendor_prefixes:
  - "VEN"
  - "DEM"
  - "CON"
  - "EPC"
  - "CTR"
  - "SUB"

# Currency codes recognized during extraction
currency_codes:
  - "USD"
  - "QAR"
  - "AED"
  - "EUR"
  - "GBP"
  - "SAR"
  - "INR"
  - "OMR"
  - "KWD"
  - "BHD"

# Scoring thresholds
scoring:
  min_column_map_score: 30    # minimum score to map a column to a field
  discovery_min_score: 15     # lower threshold used in discovery mode (unknown formats)
