version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# SPIR Enterprise — full production stack
#
# MINIMAL (no background workers, no nginx):
#   docker compose up api redis
#
# PRODUCTION (horizontal scale, workers, nginx):
#   docker compose --profile production up --build
#
# SCALE API instances:
#   docker compose up --scale api=3
#
# SCALE workers:
#   docker compose up --scale worker=4
# ─────────────────────────────────────────────────────────────────────────────

x-env: &env
  REDIS_URL:             redis://redis:6379/0
  CELERY_BROKER:         redis://redis:6379/0
  CELERY_BACKEND:        redis://redis:6379/1
  STORAGE_BACKEND:       redis            # change to "s3" for multi-host
  ASYNC_THRESHOLD_MB:    "50"
  MAX_FILE_SIZE_MB:      "2048"
  SHEET_WORKERS:         "4"
  AUTH_ENABLED:          "true"
  SECRET_KEY:            "CHANGE_THIS_IN_PRODUCTION_64_CHARS"
  LOG_LEVEL:             INFO

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI API (horizontally scalable) ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: spir-api:latest
    restart: unless-stopped
    environment:
      <<: *env
      UVICORN_WORKERS: "2"          # per-container workers (not global)
    volumes:
      - uploads:/tmp/spir_uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      replicas: 3                   # 3 API containers by default
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s

  # ── Celery worker (async large-file processing) ───────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    image: spir-worker:latest
    restart: unless-stopped
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=spir_extraction
      --max-tasks-per-child=50
    environment:
      <<: *env
    volumes:
      - uploads:/tmp/spir_uploads
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G          # each worker handles up to 2 × 2GB files concurrently
      restart_policy:
        condition: on-failure

  # ── Nginx load balancer ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro           # mount your certs here
    depends_on:
      - api
    profiles:
      - production

  # ── Flower (Celery monitoring UI) ─────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    profiles:
      - production

volumes:
  redis_data:
  uploads:
