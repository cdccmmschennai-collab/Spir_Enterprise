# infra/nginx/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy / load balancer for SPIR Enterprise
#
# Features:
#   - Round-robin load balancing across 3 API containers
#   - Long timeouts for large file uploads (2GB @ 10Mbps = 1600s)
#   - Buffering disabled for streaming downloads
#   - Gzip for JSON responses
#   - Rate limiting: 100 requests/second per IP
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 2048; }

http {
    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

    # ── Upstream pool ─────────────────────────────────────────────────────────
    upstream spir_api {
        least_conn;                          # route to least-busy server
        server api:8000 max_fails=3 fail_timeout=30s;
        # docker compose --scale api=3 creates api_1, api_2, api_3
        # Nginx resolves "api" to all containers via Docker DNS
        keepalive 32;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # ── Large file upload settings ────────────────────────────────────────────
    client_max_body_size    2100m;           # 2.1 GB max upload
    client_body_buffer_size  128k;
    client_body_timeout     1800s;           # 30 min upload timeout
    proxy_read_timeout      1800s;
    proxy_send_timeout      1800s;
    proxy_connect_timeout     60s;

    server {
        listen 80;
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ── Upload endpoint — tighter rate limit ──────────────────────────────
        location /extract {
            limit_req zone=upload burst=10 nodelay;
            proxy_pass         http://spir_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 1800s;           # 30 min for large file processing
            proxy_request_buffering off;        # stream upload directly to backend
        }

        # ── Download endpoint — disable buffering ──────────────────────────────
        location /download/ {
            proxy_pass          http://spir_api;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_buffering     off;            # stream XLSX bytes directly to browser
            proxy_read_timeout  300s;
        }

        # ── All other API endpoints ────────────────────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://spir_api;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection      "";
        }
    }
}
