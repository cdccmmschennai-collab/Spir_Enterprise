# SPIR Dynamic — Log rotation configuration
#
# DEPLOY:
#   sudo cp deploy/logrotate-spir.conf /etc/logrotate.d/spir-api
#   sudo logrotate -d /etc/logrotate.d/spir-api   # dry-run to verify
#
# Systemd journal (spir-api, spir-worker) is managed by journald.
# Configure journald limits in /etc/systemd/journald.conf:
#   SystemMaxUse=500M
#   SystemKeepFree=200M
#   MaxRetentionSec=30day
# Then: sudo systemctl restart systemd-journald

# ── Nginx SPIR-specific access and error logs ──────────────────
/var/log/nginx/spir_access.log
/var/log/nginx/spir_error.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    sharedscripts
    postrotate
        # Signal nginx to reopen log files after rotation.
        # Uses PID file; falls back gracefully if nginx is not running.
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid)
        fi
    endscript
}

# ── PM2 frontend logs ──────────────────────────────────────────
# copytruncate is safe for PM2 because PM2 holds the file open continuously.
# It copies the log then truncates in place — no reopen signal needed.
/var/log/pm2/spir-frontend-out.log
/var/log/pm2/spir-frontend-error.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    copytruncate
}
