# /etc/nginx/sites-available/spir-dynamic
#
# SETUP:
#   sudo ln -s /etc/nginx/sites-available/spir-dynamic /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace all occurrences of "your-domain.com" with your actual domain before use.

upstream spir_api {
    # Uvicorn listens on 127.0.0.1:8000 (--host in spir-api.service)
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Let certbot manage ACME challenges for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # TLS — managed by certbot. Run: sudo certbot --nginx -d your-domain.com
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;

    # ── Upload size ────────────────────────────────────────────────────────────
    # Slightly above max_file_size_mb=2048 in config.py so the application
    # returns a clean 413 JSON error before Nginx rejects the body.
    client_max_body_size 2100m;

    # Time allowed to receive the complete request body from the client.
    # A 2 GB file on a 10 Mbps uplink takes ~1638s — use 1800s (30 min).
    client_body_timeout 1800s;
    send_timeout        120s;

    # ── Next.js frontend (PM2 on port 3000) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── FastAPI — batch download (large ZIP streams) ───────────────────────────
    # Placed before the general /api/ block so the more specific path wins.
    location /api/batch/ {
        proxy_pass         http://spir_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering so ZIP bytes stream directly to the client without
        # Nginx holding the entire archive in memory/disk first.
        proxy_buffering    off;
    }

    # ── FastAPI — all other API endpoints ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://spir_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";   # keepalive to upstream
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Time to upload a large SPIR file to uvicorn
        proxy_send_timeout 1800s;

        # For /api/batch/extract the response is near-instant (job_id returned
        # immediately). For /api/extract (sync single-file) this covers the full
        # extraction time. Matches task_soft_time_limit=300 in celery_app.py.
        proxy_read_timeout 300s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Auth endpoints ─────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://spir_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Swagger / ReDoc ────────────────────────────────────────────────────────
    location ~ ^/api/(docs|redoc|openapi\.json) {
        proxy_pass         http://spir_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root     /var/www/html;
        internal;
    }
}
